<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Microsoft YaHei, sans-serif">
  <!-- Background -->
  <rect width="900" height="520" fill="#1e1e2e" rx="12"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#cdd6f4">Merge vs Rebase 效果对比</text>

  <!-- Merge Section -->
  <rect x="30" y="60" width="410" height="430" fill="#313244" rx="10"/>
  <text x="235" y="95" text-anchor="middle" font-size="18" font-weight="bold" fill="#f38ba8">合并（Merge）</text>

  <!-- Merge diagram -->
  <!-- Main branch -->
  <circle cx="80" cy="150" r="14" fill="#89b4fa"/>
  <text x="80" y="155" text-anchor="middle" font-size="10" fill="#1e1e2e" font-weight="bold">M1</text>
  <line x1="94" y1="150" x2="136" y2="150" stroke="#89b4fa" stroke-width="2.5"/>

  <circle cx="150" cy="150" r="14" fill="#89b4fa"/>
  <text x="150" y="155" text-anchor="middle" font-size="10" fill="#1e1e2e" font-weight="bold">M2</text>
  <line x1="164" y1="150" x2="206" y2="150" stroke="#89b4fa" stroke-width="2.5"/>

  <circle cx="220" cy="150" r="14" fill="#89b4fa"/>
  <text x="220" y="155" text-anchor="middle" font-size="10" fill="#1e1e2e" font-weight="bold">M3</text>
  <line x1="234" y1="150" x2="346" y2="150" stroke="#89b4fa" stroke-width="2.5" stroke-dasharray="6,4"/>

  <circle cx="360" cy="150" r="16" fill="#f9e2af" stroke="#f38ba8" stroke-width="2.5"/>
  <text x="360" y="155" text-anchor="middle" font-size="9" fill="#1e1e2e" font-weight="bold">合并</text>

  <!-- Feature branch (merge) -->
  <line x1="155" y1="164" x2="175" y2="220" stroke="#a6e3a1" stroke-width="2.5"/>
  <circle cx="180" cy="230" r="14" fill="#a6e3a1"/>
  <text x="180" y="235" text-anchor="middle" font-size="10" fill="#1e1e2e" font-weight="bold">F1</text>
  <line x1="194" y1="230" x2="236" y2="230" stroke="#a6e3a1" stroke-width="2.5"/>

  <circle cx="250" cy="230" r="14" fill="#a6e3a1"/>
  <text x="250" y="235" text-anchor="middle" font-size="10" fill="#1e1e2e" font-weight="bold">F2</text>
  <line x1="264" y1="230" x2="306" y2="230" stroke="#a6e3a1" stroke-width="2.5"/>

  <circle cx="320" cy="230" r="14" fill="#a6e3a1"/>
  <text x="320" y="235" text-anchor="middle" font-size="10" fill="#1e1e2e" font-weight="bold">F3</text>

  <!-- Merge lines -->
  <line x1="330" y1="220" x2="350" y2="164" stroke="#a6e3a1" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Labels -->
  <rect x="50" y="125" width="60" height="18" fill="#89b4fa" rx="4"/>
  <text x="80" y="138" text-anchor="middle" font-size="11" fill="#1e1e2e" font-weight="bold">main</text>

  <rect x="140" y="250" width="80" height="18" fill="#a6e3a1" rx="4"/>
  <text x="180" y="263" text-anchor="middle" font-size="11" fill="#1e1e2e" font-weight="bold">feature</text>

  <!-- Merge result timeline -->
  <text x="235" y="310" text-anchor="middle" font-size="13" font-weight="bold" fill="#cdd6f4">合并后的提交历史：</text>

  <rect x="55" y="325" width="360" height="145" fill="#45475a" rx="8"/>

  <text x="75" y="350" font-size="12" fill="#f9e2af">M1</text>
  <text x="110" y="350" font-size="11" fill="#bac2de">← 按时间排序，混合在一起</text>
  <text x="75" y="375" font-size="12" fill="#a6e3a1">F1</text>
  <text x="110" y="375" font-size="11" fill="#bac2de">← 难以区分哪些是新合入的</text>
  <text x="75" y="400" font-size="12" fill="#f9e2af">M2</text>
  <text x="75" y="425" font-size="12" fill="#a6e3a1">F2</text>
  <text x="75" y="450" font-size="12" fill="#f9e2af">M3</text>
  <text x="110" y="450" font-size="11" fill="#bac2de">← 保留合并节点</text>

  <!-- Rebase Section -->
  <rect x="460" y="60" width="410" height="430" fill="#313244" rx="10"/>
  <text x="665" y="95" text-anchor="middle" font-size="18" font-weight="bold" fill="#a6e3a1">变基（Rebase）</text>

  <!-- Rebase diagram - before -->
  <!-- Main branch -->
  <circle cx="510" cy="150" r="14" fill="#89b4fa"/>
  <text x="510" y="155" text-anchor="middle" font-size="10" fill="#1e1e2e" font-weight="bold">M1</text>
  <line x1="524" y1="150" x2="556" y2="150" stroke="#89b4fa" stroke-width="2.5"/>

  <circle cx="570" cy="150" r="14" fill="#89b4fa"/>
  <text x="570" y="155" text-anchor="middle" font-size="10" fill="#1e1e2e" font-weight="bold">M2</text>
  <line x1="584" y1="150" x2="616" y2="150" stroke="#89b4fa" stroke-width="2.5"/>

  <circle cx="630" cy="150" r="14" fill="#89b4fa"/>
  <text x="630" y="155" text-anchor="middle" font-size="10" fill="#1e1e2e" font-weight="bold">M3</text>
  <line x1="644" y1="150" x2="676" y2="150" stroke="#89b4fa" stroke-width="2.5"/>

  <!-- Rebased feature commits on top of main -->
  <circle cx="690" cy="150" r="14" fill="#a6e3a1"/>
  <text x="690" y="155" text-anchor="middle" font-size="10" fill="#1e1e2e" font-weight="bold">F1'</text>
  <line x1="704" y1="150" x2="736" y2="150" stroke="#a6e3a1" stroke-width="2.5"/>

  <circle cx="750" cy="150" r="14" fill="#a6e3a1"/>
  <text x="750" y="155" text-anchor="middle" font-size="10" fill="#1e1e2e" font-weight="bold">F2'</text>
  <line x1="764" y1="150" x2="796" y2="150" stroke="#a6e3a1" stroke-width="2.5"/>

  <circle cx="810" cy="150" r="14" fill="#a6e3a1"/>
  <text x="810" y="155" text-anchor="middle" font-size="10" fill="#1e1e2e" font-weight="bold">F3'</text>

  <!-- Labels -->
  <rect x="480" y="125" width="60" height="18" fill="#89b4fa" rx="4"/>
  <text x="510" y="138" text-anchor="middle" font-size="11" fill="#1e1e2e" font-weight="bold">main</text>

  <rect x="700" y="125" width="80" height="18" fill="#a6e3a1" rx="4"/>
  <text x="740" y="138" text-anchor="middle" font-size="11" fill="#1e1e2e" font-weight="bold">feature</text>

  <!-- Arrow showing rebase direction -->
  <text x="665" y="210" text-anchor="middle" font-size="12" fill="#f9e2af">↑ 提交被"移动"到 main 最新节点之后</text>

  <!-- Rebase description -->
  <text x="665" y="310" text-anchor="middle" font-size="13" font-weight="bold" fill="#cdd6f4">变基后的提交历史：</text>

  <rect x="485" y="325" width="360" height="145" fill="#45475a" rx="8"/>

  <text x="505" y="350" font-size="12" fill="#f9e2af">M1</text>
  <text x="540" y="350" font-size="11" fill="#bac2de">← 按合入顺序排列</text>
  <text x="505" y="375" font-size="12" fill="#f9e2af">M2</text>
  <text x="540" y="375" font-size="11" fill="#bac2de">← 主干提交在前</text>
  <text x="505" y="400" font-size="12" fill="#f9e2af">M3</text>
  <text x="505" y="425" font-size="12" fill="#a6e3a1">F1'</text>
  <text x="540" y="425" font-size="11" fill="#bac2de">← 分支提交整齐排在后面</text>
  <text x="505" y="450" font-size="12" fill="#a6e3a1">F2'</text>
  <text x="540" y="450" font-size="11" fill="#bac2de">← 清晰可见新增了哪些变更</text>

  <!-- Bottom summary -->
  <line x1="450" y1="70" x2="450" y2="490" stroke="#585b70" stroke-width="1" stroke-dasharray="5,5"/>
</svg>
